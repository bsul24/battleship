<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship</title>
  </head>
  <body>
    <div id="app">
      <header class="page-header">
        <h1>Battleship</h1>
      </header>

      <main class="game">
        <section class="game-status-panel" aria-live="polite">
          <h2 class="main-status">Your turn</h2>
          <p class="sub-status">Choose a coordinate on the computer board.</p>

          <div class="action-log">
            <p class="player-action-status">Your last attack: —</p>
            <p class="computer-action-status">Computer's last attack: —</p>
          </div>

          <button class="new-game-btn" type="button">New Game</button>
          <button class="randomize-fleet-btn" type="button">
            Randomize Fleet
          </button>
        </section>

        <section class="gameboards-container">
          <div class="board-section human-board-container">
            <div class="board-header">
              <h3 class="gameboard-title">Your Board</h3>
              <p class="board-description">Your ships are visible here.</p>
            </div>

            <div class="gameboard human-board" aria-label="Your board"></div>
          </div>

          <div class="board-section computer-board-container">
            <div class="board-header">
              <h3 class="gameboard-title">Computer Board</h3>
              <p class="board-description">Attack this board.</p>
            </div>

            <div
              class="gameboard computer-board"
              aria-label="Computer board"
            ></div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
